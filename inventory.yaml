version: "1"

entries:
  # ── Plugins ──────────────────────────────────────────────
  - name: plugin-core
    type: plugin
    description: "Core system plugin — compaction, config, log-reader, usage-report, reminders, calendar"
    repository: "https://github.com/ketanlad/plugin-core"
    latest_version: "2.1.0"
    category: core
    # Foundational: ai-assistant's install.sh pulls this in. Flagged so the
    # dashboard first-run flow (AI-429) highlights it alongside ai-assistant.
    recommended_first: true

  - name: plugin-google
    type: plugin
    description: "Gmail tools and sensors"
    repository: "https://github.com/ketanlad/plugin-google"
    latest_version: "2.0.0"
    category: integration

  - name: plugin-microsoft-365
    type: plugin
    description: "Microsoft 365 email and Teams chat tools and sensors"
    repository: "https://github.com/ketanlad/plugin-microsoft-365"
    latest_version: "1.0.0"
    category: integration

  - name: plugin-whatsapp
    type: plugin
    description: "WhatsApp integration — message capture and search via whatsapp-bridge"
    repository: "https://github.com/ketanlad/plugin-whatsapp"
    latest_version: "0.2.0"
    category: integration

  - name: plugin-triage
    type: plugin
    description: "Cross-platform email and instant message triage skills"
    repository: "https://github.com/ketanlad/plugin-triage"
    latest_version: "1.0.0"
    category: workflow
    requires:
      - plugin-google
      - plugin-microsoft-365
      - plugin-whatsapp

  # ── Gateways (managed processes) ─────────────────────────
  - name: ai-gateway
    type: gateway
    description: "Telegram gateway — connects to the assistant's WS bus on :8767"
    repository: "https://github.com/ketanlad/ai-gateway"
    latest_version: "0.1.0"
    category: integration

  # ── Services (managed processes) ─────────────────────────
  # ai-assistant is the foundational managed process (Story AI-424 / AI-425):
  # it opens the WS bus on :8767 and is the first install in the dashboard
  # first-run flow. Type `service` matches its component.yaml. Its install.sh
  # pulls in plugin-core, so both are flagged recommended_first.
  - name: ai-assistant
    type: service
    description: "Core AI agent — Claude + MCP + WS bus on :8767 (foundational process)"
    repository: "https://github.com/ketanlad/ai-assistant"
    latest_version: "0.1.0"
    category: core
    requires:
      - plugin-core
    recommended_first: true

  - name: whatsapp-bridge
    type: service
    description: "WhatsApp Baileys bridge — read-only message capture over HTTP on :3100; dashboard QR/pairing-code regeneration"
    repository: "https://github.com/ketanlad/whatsapp-bridge"
    latest_version: "1.0.0"
    category: integration

  # ── Personas ─────────────────────────────────────────────
  - name: persona-pa
    type: persona
    description: "Personal assistant persona — warm, resourceful, opinionated"
    repository: "https://github.com/ketanlad/persona-pa"
    latest_version: "1.0.0"
    category: persona

  - name: persona-operations
    type: persona
    description: "Operations persona — structured, process-oriented, reliability-focused"
    repository: "https://github.com/ketanlad/persona-operations"
    latest_version: "1.0.0"
    category: persona

  - name: persona-developer
    type: persona
    description: "Developer persona — terse, code-oriented, testing-focused"
    repository: "https://github.com/ketanlad/persona-developer"
    latest_version: "1.0.0"
    category: persona

  - name: persona-ceo
    type: persona
    description: "CEO persona — strategic, decisive, delegation-minded"
    repository: "https://github.com/ketanlad/persona-ceo"
    latest_version: "1.0.0"
    category: persona
