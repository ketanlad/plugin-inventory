$schema: "https://json-schema.org/draft/2020-12/schema"
title: Plugin Inventory
description: Schema for the plugin-inventory manifest (inventory.yaml)
type: object
required:
  - version
  - entries
additionalProperties: false

properties:
  version:
    type: string
    description: Schema version identifier
    enum: ["1"]

  entries:
    type: array
    description: >-
      List of available installable components — spans all four component
      types: plugin, persona, gateway, service.
    items:
      type: object
      required:
        - name
        - type
        - description
        - repository
        - latest_version
      additionalProperties: false
      properties:
        name:
          type: string
          description: Kebab-case component name (plugin/persona/gateway/service)
          pattern: "^[a-z][a-z0-9-]+$"
        type:
          type: string
          description: >-
            Component type. plugin/persona are static workspace artifacts;
            gateway/service are managed processes supervised by ai-supervisor.
          enum: [plugin, persona, gateway, service]
        description:
          type: string
          description: Short one-line description
        repository:
          type: string
          description: Git clone URL
          pattern: "^https://"
        latest_version:
          type: string
          description: Latest released semver version
          pattern: "^\\d+\\.\\d+\\.\\d+$"
        category:
          type: string
          description: "Grouping: core, integration, workflow, persona"
          enum: [core, integration, workflow, persona]
        requires:
          type: array
          description: Soft dependency plugin names
          items:
            type: string
            pattern: "^[a-z][a-z0-9-]+$"
        recommended_first:
          type: boolean
          description: >-
            Advisory flag — the dashboard first-run flow highlights components
            flagged true (foundational ai-assistant + plugin-core) ahead of
            optional gateway/service add-ons. Defaults to false.
